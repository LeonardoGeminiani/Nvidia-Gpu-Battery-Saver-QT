<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- chip body -->
  <rect x="14" y="14" width="36" height="36" rx="5" fill="#222"/>
  <rect x="20" y="20" width="24" height="24" rx="3" fill="#2a2a2a"/>
  <!-- pins left -->
  <rect x="8"  y="20" width="6" height="3" rx="1" fill="#555"/>
  <rect x="8"  y="26" width="6" height="3" rx="1" fill="#555"/>
  <rect x="8"  y="32" width="6" height="3" rx="1" fill="#555"/>
  <rect x="8"  y="38" width="6" height="3" rx="1" fill="#555"/>
  <!-- pins right -->
  <rect x="50" y="20" width="6" height="3" rx="1" fill="#555"/>
  <rect x="50" y="26" width="6" height="3" rx="1" fill="#555"/>
  <rect x="50" y="32" width="6" height="3" rx="1" fill="#555"/>
  <rect x="50" y="38" width="6" height="3" rx="1" fill="#555"/>
  <!-- pins top -->
  <rect x="20" y="8"  width="3" height="6" rx="1" fill="#555"/>
  <rect x="26" y="8"  width="3" height="6" rx="1" fill="#555"/>
  <rect x="32" y="8"  width="3" height="6" rx="1" fill="#555"/>
  <rect x="38" y="8"  width="3" height="6" rx="1" fill="#555"/>
  <!-- pins bottom -->
  <rect x="20" y="50" width="3" height="6" rx="1" fill="#555"/>
  <rect x="26" y="50" width="3" height="6" rx="1" fill="#555"/>
  <rect x="32" y="50" width="3" height="6" rx="1" fill="#555"/>
  <rect x="38" y="50" width="3" height="6" rx="1" fill="#555"/>
  <!-- power indicator -->
  <circle cx="32" cy="32" r="8" fill="#4CAF50"/>
  <circle cx="32" cy="32" r="4" fill="#222"/>
</svg>
